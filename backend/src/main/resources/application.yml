spring:
  application:
    name: art-analyzer

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/artanalyzer}
    username: ${DB_USERNAME:artuser}
    password: ${DB_PASSWORD:artpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:your-very-long-secret-key-that-should-be-at-least-256-bits-long-for-hs256}
    expiration-ms: 1800000  # 30 minutes

  google:
    api-key: ${GOOGLE_API_KEY:}
    embedding-model: text-embedding-004
    embedding-url: https://generativelanguage.googleapis.com/v1beta/models
    gemini-model: gemini-1.5-flash
    gemini-url: https://generativelanguage.googleapis.com/v1beta/models

  upload:
    path: ${UPLOAD_PATH:/uploads}

  rag:
    top-k: 5

  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

server:
  port: 8080
